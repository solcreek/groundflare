name: Release

# npm publish via OIDC Trusted Publishers — multi-package monorepo.
#
# Two trigger shapes:
#
#   1. Tag push:
#        groundflare@v0.2.2           → publishes packages/groundflare
#        groundflare-estimate@v0.1.1  → publishes packages/estimate
#        create-groundflare-app@v0.1.0 → publishes packages/create-groundflare-app
#
#      `<package-name>@v<semver>` — matches npm's own tag convention and
#      is what lerna, changesets, and pnpm publish emit by default.
#
#      Legacy `v*` tags (e.g. v0.2.0, v0.2.1) are still honoured and map
#      to the `groundflare` package so the existing release history
#      stays meaningful.
#
#   2. Manual dispatch:
#        Actions → Release → Run workflow
#          package: <choose one>
#
#      Publishes whatever version is in that package's package.json at
#      HEAD. Useful for retries after a burnt-version failure.
#
# Prerequisite — each npm package needs its own Trusted Publisher
# config on npmjs.com. Same fields for all three:
#
#   Publisher         : GitHub Actions
#   Repository owner  : solcreek
#   Repository        : groundflare
#   Workflow filename : release.yml   (just the filename, no path)
#   Environment       : (leave blank)
#
# Node 24 is required — Trusted Publishers support landed in npm 11.5+
# and Node 22 LTS still bundles npm 10.x.
#
# Trusted Publisher flow enables provenance automatically; we do NOT
# pass `--provenance` explicitly.

on:
  push:
    tags:
      - 'v*'                        # legacy: groundflare
      - 'groundflare@v*'
      - 'groundflare-estimate@v*'
      - 'create-groundflare-app@v*'
  workflow_dispatch:
    inputs:
      package:
        description: 'npm package to publish'
        required: true
        type: choice
        options:
          - groundflare
          - groundflare-estimate
          - create-groundflare-app

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: npm publish (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Derive package + workspace dir from trigger
        id: parse
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pkg="${{ inputs.package }}"
          else
            tag="${GITHUB_REF_NAME}"
            if [[ "$tag" == *"@v"* ]]; then
              pkg="${tag%@v*}"
            else
              # Legacy `v*` — always means the main CLI.
              pkg="groundflare"
            fi
          fi

          case "$pkg" in
            groundflare)              dir="packages/groundflare" ;;
            groundflare-estimate)     dir="packages/estimate" ;;
            create-groundflare-app)   dir="packages/create-groundflare-app" ;;
            *)
              echo "::error::unknown package $pkg"
              exit 1
              ;;
          esac

          echo "package=$pkg"        >> "$GITHUB_OUTPUT"
          echo "workspace_dir=$dir"  >> "$GITHUB_OUTPUT"
          echo "Resolved: package=$pkg dir=$dir"

      - name: Install
        run: npm ci

      # Monorepo build order: groundflare imports from
      # groundflare-estimate, so its dist must exist before groundflare's
      # own build step can resolve the sibling package's .d.ts. Build
      # every published workspace first; no-op if the target has no
      # `build` script or nothing to emit.
      - name: Build all published workspaces
        run: npm run build

      - name: Pre-publish gate (check + lint + test)
        run: |
          npm run check -w ${{ steps.parse.outputs.package }}
          npm run lint -w ${{ steps.parse.outputs.package }}
          npm run test -w ${{ steps.parse.outputs.package }}

      - name: Assert tag version matches package.json
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *"@v"* ]]; then
            tag_ver="${tag#*@v}"
          else
            tag_ver="${tag#v}"
          fi
          pkg_ver=$(node -p "require('./${{ steps.parse.outputs.workspace_dir }}/package.json').version")
          if [ "$tag_ver" != "$pkg_ver" ]; then
            echo "::error::tag $tag → version $tag_ver, but ${{ steps.parse.outputs.package }}/package.json is $pkg_ver"
            exit 1
          fi
          echo "tag $tag matches ${{ steps.parse.outputs.package }} version $pkg_ver"

      - name: Publish to npm (OIDC + auto provenance)
        run: npm publish -w ${{ steps.parse.outputs.package }}
