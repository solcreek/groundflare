name: Release

# npm publish via OIDC Trusted Publishers.
#
# Triggered on tag pushes matching `v*` (e.g. `v0.2.1`). Also supports
# manual dispatch for retry-without-re-tagging when a run fails after
# the version number is burnt on the registry side.
#
# Prerequisite — one-time setup on npmjs.com:
#   1. https://www.npmjs.com/package/groundflare/access
#   2. Add a Trusted Publisher with:
#        Publisher         : GitHub Actions
#        Repository owner  : solcreek
#        Repository        : groundflare
#        Workflow filename : release.yml       (just the filename, no path)
#        Environment       : (leave blank)
#
# Node 24 is required because Trusted Publishers support landed in
# npm 11.5+ and Node 22 LTS still bundles npm 10.x.
#
# The Trusted Publisher flow adds provenance automatically — we do NOT
# pass `--provenance` explicitly. Similarly, access=public is already
# pinned via package.json publishConfig, so `--access public` on the
# command line is redundant and can interfere with the OIDC-driven
# publish path.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: npm publish (OIDC)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Pre-publish gate (check + lint + test + build)
        run: npm run prepublishOnly -w groundflare

      - name: Assert tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(node -p "require('./packages/groundflare/package.json').version")
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match groundflare package version $pkg"
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches groundflare package version $pkg"

      - name: Publish to npm (OIDC + auto provenance)
        run: npm publish -w groundflare
