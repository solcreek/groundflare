name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new push lands —
# avoids queued back-to-back full suites on rapid commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Unit + integration + lint + typecheck ───────────────────────
  # Matrix over {ubuntu, macos} × {node 20, 22} so we catch path-
  # separator + line-ending surprises and stay inside package.json's
  # engines >=20 contract.
  check:
    name: check (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Test (unit + integration + conformance)
        run: npm test

  # ─── Tier 3 e2e: fake-vps Docker simulator ──────────────────────
  # Ubuntu runners ship Docker pre-installed. macOS runners ship
  # Docker but via nested virtualization — much slower and flakier,
  # so we stick to Linux only for e2e.
  e2e:
    name: e2e (ubuntu / node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Don't run on forks — they can't pull the private/public image
    # cache and the run just repeats work. Can be loosened later.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Docker sanity check
        run: docker info

      - name: Build fake-vps image (cached by Docker layer cache)
        run: docker build -t groundflare/fake-vps:test -f test/e2e/fixtures/fake-vps/Dockerfile test/e2e/fixtures/fake-vps

      - name: Test (Tier 3 e2e)
        run: npm run test:e2e
